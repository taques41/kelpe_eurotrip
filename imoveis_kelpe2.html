<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imóveis Kelpe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6366F1;
    --primary-light: #EEF2FF;
    --primary-dark: #4F46E5;
    --bg: #F8FAFC;
    --text: #0F172A;
    --text2: #334155;
    --accent: #10B981;
    --accent-light: #ECFDF5;
    --danger: #EF4444;
    --danger-light: #FEF2F2;
    --card: #FFFFFF;
    --border: #E2E8F0;
    --muted: #94A3B8;
    --header: #0F172A;
    --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 8px rgba(15,23,42,0.04);
    --shadow-hover: 0 8px 32px rgba(99,102,241,0.18), 0 2px 8px rgba(15,23,42,0.06);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* HEADER */
  header {
    background: var(--header);
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 24px rgba(0,0,0,0.2);
  }

  .header-top {
    max-width: 1264px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .logo {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .logo .sub { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 8px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .view-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.65);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .view-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .view-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .view-btn.active-up   { background: rgba(16,185,129,0.18); border-color: rgba(16,185,129,0.35); color: #6EE7B7; }
  .view-btn.active-down { background: rgba(239,68,68,0.18);  border-color: rgba(239,68,68,0.35);  color: #FCA5A5; }
  .view-btn .cnt { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.12); padding: 1px 7px; border-radius: 20px; min-width: 20px; text-align: center; }
  .view-btn.active-up .cnt   { background: rgba(16,185,129,0.3); }
  .view-btn.active-down .cnt { background: rgba(239,68,68,0.3); }

  .sort-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.65);
  }
  .sort-wrap svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
  .sort-sel {
    background: transparent; border: none;
    color: rgba(255,255,255,0.8);
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    cursor: pointer; outline: none; -webkit-appearance: none; appearance: none;
  }
  .sort-sel option { background: #1E293B; color: #fff; }

  .export-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    background: var(--primary); color: white; border: none;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .export-btn svg { width: 14px; height: 14px; }
  .export-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

  /* FILTER BAR */
  .filter-bar {
    max-width: 1264px; margin: 0 auto;
    display: flex; overflow-x: auto; scrollbar-width: none;
    padding: 0 32px; transition: opacity 0.2s;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-bar.dimmed { opacity: 0.35; pointer-events: none; }

  .filter-btn {
    padding: 14px 18px; border: none; background: none;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    color: rgba(255,255,255,0.45);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s;
    white-space: nowrap; display: flex; align-items: center; gap: 5px;
  }
  .filter-btn:hover:not(.active) { color: rgba(255,255,255,0.75); }
  .filter-btn.active { color: #fff; border-bottom-color: var(--primary); font-weight: 600; }
  .filter-btn .cnt { font-size: 10.5px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 8px; }
  .filter-btn.active .cnt { background: var(--primary); color: white; }

  /* MAIN */
  main { max-width: 1264px; margin: 0 auto; padding: 40px 32px 56px; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.6px;
    text-transform: uppercase; color: var(--primary);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(348px, 1fr)); gap: 20px; margin-bottom: 52px; }

  /* CARD */
  .card {
    background: var(--card); border-radius: 16px; padding: 24px;
    border: 1.5px solid var(--border); box-shadow: var(--shadow-sm);
    transition: box-shadow 0.22s, transform 0.22s, border-color 0.22s;
    display: flex; flex-direction: column;
    animation: rise 0.35s ease both;
  }
  @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .card.voted-up   { border-color: var(--accent); }
  .card.voted-down { border-color: var(--danger); }

  .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }

  .card-num {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--muted); background: var(--bg); padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
  }

  .tier {
    font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 6px;
    letter-spacing: 0.5px; flex-shrink: 0; cursor: default;
  }
  .tier-1 { background: #ECFDF5; color: #065F46; }
  .tier-2 { background: #EFF6FF; color: #1D4ED8; }
  .tier-3 { background: #FFFBEB; color: #92400E; }
  .tier-4 { background: #FFF7ED; color: #C2410C; }
  .tier-5 { background: #FEF2F2; color: #991B1B; }

  .thumbs { display: flex; gap: 4px; margin-left: auto; }

  .thumb-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid var(--border); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; flex-shrink: 0; color: var(--muted);
  }
  .thumb-btn svg { width: 16px; height: 16px; }
  .thumb-btn.up:hover   { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .thumb-btn.up.on      { background: var(--accent); border-color: var(--accent); color: white; }
  .thumb-btn.down:hover { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
  .thumb-btn.down.on    { background: var(--danger); border-color: var(--danger); color: white; }

  .card-desc { font-size: 14.5px; font-weight: 600; color: var(--text); margin-bottom: 14px; line-height: 1.45; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .chip { font-size: 11.5px; font-weight: 500; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
  .chip-area  { background: #EFF6FF; color: #1E40AF; }
  .chip-pm2   { background: #F0FDF4; color: #166534; }
  .chip-condo { background: #FFF7ED; color: #9A3412; }

  .card-price { font-size: 21px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 20px; }
  .card-price .cur { font-size: 13px; font-weight: 500; color: var(--text2); margin-right: 2px; }

  .card-foot {
    margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  .link-btn {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--primary); font-size: 13px; font-weight: 500;
    text-decoration: none; transition: gap 0.15s;
  }
  .link-btn:hover { gap: 8px; color: var(--primary-dark); }
  .link-btn svg { width: 12px; height: 12px; }

  .share-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: #F0FDF4; color: #166534; border: none;
    padding: 7px 12px; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .share-btn:hover { background: #25D366; color: white; }
  .share-btn svg { width: 13px; height: 13px; }

  /* EMPTY */
  .empty { text-align: center; padding: 72px 32px; color: var(--muted); }
  .empty .icon { font-size: 44px; margin-bottom: 16px; }
  .empty p { font-size: 15px; line-height: 1.6; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: white;
    padding: 12px 22px; border-radius: 10px;
    font-size: 13px; font-weight: 500; z-index: 999;
    transition: transform 0.3s ease; white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  footer { text-align: center; padding: 28px 32px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }

  @media (max-width: 680px) {
    .header-top { padding: 14px 16px; }
    .filter-bar { padding: 0 16px; }
    main { padding: 24px 16px 40px; }
    .grid { grid-template-columns: 1fr; gap: 16px; }
    .logo .sub { display: none; }
    .export-btn .lbl { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Imóveis Kelpe <span class="sub">Curitiba · 2026</span></div>
    <div class="header-right">

        <span class="lbl">Exportar Escolhas</span>
      </button>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
</header>

<main id="main"></main>
<footer>Imóveis Kelpe · Curitiba, PR · 2026 — 24 imóveis catalogados</footer>
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────

  {id:'juveve',      label:'Juvevê'},
  {id:'agua-verde',  label:'Água Verde'},
];

// ── TIER CALC (quintiles by priceM2) ─────────────────────────────────
(function(){
  const s = [...PROPS].sort((a,b)=>a.priceM2-b.priceM2), n=s.length;
  const q = p => s[Math.ceil(n*p)-1].priceM2;
  const T = [q(0.2),q(0.4),q(0.6),q(0.8)];
  PROPS.forEach(p=>{
    p.tier = p.priceM2<=T[0]?1 : p.priceM2<=T[1]?2 : p.priceM2<=T[2]?3 : p.priceM2<=T[3]?4 : 5;
  });
})();

// ── STATE ─────────────────────────────────────────────────────────────
const SK = 'kelpe_v4';
let votes={}, view='neighborhood', bairro='cristo-rei', sortBy='default';

function loadVotes(){ try{ votes=JSON.parse(localStorage.getItem(SK))||{}; }catch{ votes={}; } }
function saveVotes(){ localStorage.setItem(SK,JSON.stringify(votes)); }

// ── SVGs ──────────────────────────────────────────────────────────────
const IDUP   = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h2c.55 0 1-.45 1-1v-9c0-.55-.45-1-1-1H2v11zm19.83-7.12c.11-.25.17-.52.17-.88v-2c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13.17 2 7.59 7.59C7.22 7.95 7 8.45 7 9v11c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>`;
const IDDOWN = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 4h-2c-.55 0-1 .45-1 1v9c0 .55.45 1 1 1h2V4zM2.17 11.12c-.11.25-.17.52-.17.88v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 22l5.59-5.59c.36-.36.58-.86.58-1.41V4c0-1.1-.9-2-2-2H6c-.83 0-1.54.5-1.84 1.22L1.14 10.27c-.09.23-.14.47-.14.73v2z"/></svg>`;
const IDWA   = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.49"/></svg>`;
const IDEXT  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>`;
const TIER_L = ['','$','$$','$$$','$$$$','$$$$$'];
const TIER_T = ['','Mais barato da lista','','','','Mais caro da lista'];

// ── FORMAT ────────────────────────────────────────────────────────────
const R = n => 'R$ ' + n.toLocaleString('pt-BR');

// ── CARD ──────────────────────────────────────────────────────────────
function cardHTML(p){
  const v=votes[p.id]||null;
  const cls = v==='up'?'voted-up':v==='down'?'voted-down':'';
  const condo = p.condo?`<span class="chip chip-condo">Cond. ${R(p.condo)}</span>`:'';
  return `
<div class="card ${cls}" data-id="${p.id}">
  <div class="card-head">
    <span class="card-num">Nº ${p.num}</span>
    <span class="tier tier-${p.tier}" title="${TIER_T[p.tier]}">${TIER_L[p.tier]}</span>
    <div class="thumbs">
      <button class="thumb-btn up${v==='up'?' on':''}"   onclick="castVote(${p.id},'up')"   title="Gostei">${IDUP}</button>
      <button class="thumb-btn down${v==='down'?' on':''}" onclick="castVote(${p.id},'down')" title="Não gostei">${IDDOWN}</button>
    </div>
  </div>
  <div class="card-desc">${p.desc}</div>
  <div class="chips">
    <span class="chip chip-area">${p.area} m²</span>
    <span class="chip chip-pm2">${R(p.priceM2)}/m²</span>
    ${condo}
  </div>
  <div class="card-price"><span class="cur">R$</span>${p.price.toLocaleString('pt-BR')}</div>
  <div class="card-foot">
    <a class="link-btn" href="${p.link}" target="_blank">Ver imóvel ${IDEXT}</a>
    <button class="share-btn" onclick="shareCard(${p.id})">${IDWA} Compartilhar</button>
  </div>
</div>`;
}

function applySort(list){
  if(sortBy==='price')   return [...list].sort((a,b)=>a.price-b.price);
  if(sortBy==='priceM2') return [...list].sort((a,b)=>a.priceM2-b.priceM2);
  if(sortBy==='area')    return [...list].sort((a,b)=>b.area-a.area);
  return list;
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('main');
  let list, title;

  if(view==='aprovados'){
    list  = PROPS.filter(p=>votes[p.id]==='up');
    title = '👍&nbsp; Imóveis que gostei';
  } else if(view==='reprovados'){
    list  = PROPS.filter(p=>votes[p.id]==='down');
    title = '👎&nbsp; Imóveis que não gostei';
  } else {
    list  = PROPS.filter(p=>p.bairro===bairro);
    title = BAIRROS.find(b=>b.id===bairro)?.label||'';
  }

  if(!list.length){
    const msg = view==='aprovados'
      ? 'Nenhum imóvel aprovado ainda.<br>Use o 👍 nos cards para marcar.'
      : view==='reprovados'
        ? 'Nenhum imóvel reprovado ainda.<br>Use o 👎 nos cards para marcar.'
        : 'Nenhum imóvel neste bairro.';
    el.innerHTML=`<div class="section-label">${title}</div><div class="empty"><div class="icon">${view==='aprovados'?'👍':view==='reprovados'?'👎':'🏠'}</div><p>${msg}</p></div>`;
    return;
  }

  const cards = applySort(list).map(cardHTML).join('');
  el.innerHTML=`<div class="section-label">${title}</div><div class="grid">${cards}</div>`;
}

// ── VOTE ──────────────────────────────────────────────────────────────
function castVote(id,dir){
  votes[id]===dir ? delete votes[id] : votes[id]=dir;
  saveVotes(); updateCounts(); render();
}

// ── VIEW TOGGLE ───────────────────────────────────────────────────────
function toggleView(mode){
  view = view===mode?'neighborhood':mode;
  document.getElementById('btn-up').className   = 'view-btn'+(view==='aprovados' ?' active-up':'');
  document.getElementById('btn-down').className = 'view-btn'+(view==='reprovados'?' active-down':'');
  document.getElementById('filter-bar').classList.toggle('dimmed', view!=='neighborhood');
  render();
}

// ── BAIRRO ────────────────────────────────────────────────────────────
function setBairro(id){
  bairro=id;
  if(view!=='neighborhood'){
    view='neighborhood';
    document.getElementById('btn-up').className='view-btn';
    document.getElementById('btn-down').className='view-btn';
    document.getElementById('filter-bar').classList.remove('dimmed');
  }
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  render();
}

function setSortBy(v){ sortBy=v; render(); }

// ── COUNTS ────────────────────────────────────────────────────────────
function updateCounts(){
  const vals=Object.values(votes);
  document.getElementById('cnt-up').textContent   = vals.filter(v=>v==='up').length;
  document.getElementById('cnt-down').textContent = vals.filter(v=>v==='down').length;
}

// ── SHARE CARD ────────────────────────────────────────────────────────
function shareCard(id){
  const p=PROPS.find(x=>x.id===id);
  window.open('https://wa.me/?text='+encodeURIComponent(
    `🏠 *Imóveis Kelpe* — Nº ${p.num}\n${p.desc}\n${R(p.price)} | ${p.area}m² | ${R(p.priceM2)}/m²\n${p.link}`
  ),'_blank');
}

// ── EXPORT ────────────────────────────────────────────────────────────
function exportChoices(){
  const upIds   = Object.entries(votes).filter(([,v])=>v==='up').map(([k])=>+k);
  const downIds = Object.entries(votes).filter(([,v])=>v==='down').map(([k])=>+k);
  if(!upIds.length&&!downIds.length){ showToast('Nenhum imóvel classificado ainda!'); return; }

  const fmt = ids => ids.length
    ? ids.map(id=>{ const p=PROPS.find(x=>x.id===id);
        return `[Nº ${p.num}] ${p.desc}\n${R(p.price)} | ${p.area}m² | ${R(p.priceM2)}/m²\n${p.link}`; }).join('\n\n')
    : '(nenhum)';

  const body =
    `IMÓVEIS KELPE — MINHAS ESCOLHAS\n${'─'.repeat(36)}\n\n` +
    `✅ IMÓVEIS QUE GOSTEI:\n\n${fmt(upIds)}\n\n\n` +
    `❌ IMÓVEIS QUE NÃO GOSTEI:\n\n${fmt(downIds)}`;

  window.location.href=`mailto:?subject=${encodeURIComponent('Imóveis Kelpe — Minhas Escolhas')}&body=${encodeURIComponent(body)}`;
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ── INIT ──────────────────────────────────────────────────────────────
function init(){
  loadVotes();
  const fb=document.getElementById('filter-bar');
  fb.innerHTML=BAIRROS.map(b=>{
    const n=PROPS.filter(p=>p.bairro===b.id).length;
    return `<button class="filter-btn${b.id===bairro?' active':''}" data-id="${b.id}" onclick="setBairro('${b.id}')">${b.label}<span class="cnt">${n}</span></button>`;
  }).join('');
  updateCounts();
  render();
}

init();
</script>
</body>
</html>
